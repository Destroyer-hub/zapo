name: github-release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: create github release with generated notes
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  prerelease: ${{ contains(github.ref_name, '-') }}
